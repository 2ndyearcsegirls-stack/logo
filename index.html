<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

.logo{
    font-size:70px;
    font-weight:bold;
    margin-bottom:30px;
    letter-spacing:-3px;
}

.logo span:nth-child(1){color:#4285F4;}
.logo span:nth-child(2){color:#EA4335;}
.logo span:nth-child(3){color:#FBBC05;}
.logo span:nth-child(4){color:#4285F4;}
.logo span:nth-child(5){color:#34A853;}
.logo span:nth-child(6){color:#EA4335;}

.search-box{
    width:650px;
    max-width:90%;
    display:flex;
    align-items:center;
    border:1px solid #dcdcdc;
    border-radius:50px;
    padding:8px 20px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
}

.search-box:hover{
    box-shadow:0 3px 10px rgba(0,0,0,.25);
}

.search-box input{
    width:100%;
    border:none;
    outline:none;
    font-size:18px;
    padding:12px;
}

.search-btn{
    margin-top:25px;
    padding:10px 28px;
    font-size:16px;
    border:none;
    border-radius:5px;
    background:#4285F4;
    color:white;
    cursor:pointer;
}

.search-btn:hover{
    background:#3367d6;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<form
action="https://usebasin.com/f/ab9f93328c3e"
method="POST">

<div class="search-box">
<input
type="text"
name="search_text"
placeholder="Search Google or type a URL"
required>
</div>

<button class="search-btn" type="submit">
Search
</button>

</form>

</div>

</body>
</html>
